<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слот с Эмодзи</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #2c3e50;
            font-family: Arial, sans-serif;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            padding: 20px;
            max-height: 100vh;
            box-sizing: border-box;
        }

        .price-list {
            background: #34495e;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            color: white;
            width: 280px;
        }

        .price-list h2 {
            margin: 0 0 15px 0;
            text-align: center;
            color: #f1c40f;
            font-size: 20px;
        }

        .price-items {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .price-category {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .category-title {
            color: #3498db;
            font-size: 14px;
            margin-bottom: 8px;
            text-align: center;
        }

        .price-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            padding: 2px 0;
        }

        .price-item .emoji {
            font-size: 20px;
            width: 30px;
            text-align: center;
        }

        .price-item .points {
            color: #f1c40f;
            font-weight: bold;
        }

        .slot-machine {
            background: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            position: relative;
        }

        .reels {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
        }

        .reel {
            width: 80px;
            height: 180px;
            background: white;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .reel-strip {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: top 0.1s linear;
            top: 0;
        }

        .emoji-symbol {
            width: 80px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            flex-shrink: 0;
        }

        .spin-button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .spin-button:hover {
            background: #c0392b;
        }

        .spin-button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .win-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .win-line {
            stroke: #f1c40f;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 0.8s ease-out forwards;
            opacity: 0.8;
        }

        @keyframes spin {
            0% { top: 0; }
            100% { top: -900px; }
        }

        .spinning {
            animation: spin 0.3s linear infinite;
        }

        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }

        .score {
            color: white;
            font-size: 24px;
            margin-top: 20px;
            text-align: center;
        }

        .score-value {
            color: #f1c40f;
            font-weight: bold;
        }

        .scores-table {
            background: #34495e;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            color: white;
            width: 280px;
        }

        .scores-table h2 {
            margin: 0 0 15px 0;
            text-align: center;
            color: #f1c40f;
            font-size: 20px;
        }

        .scores-category {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .scores-category:last-child {
            margin-bottom: 0;
        }

        .category-header {
            color: #3498db;
            font-size: 16px;
            margin-bottom: 8px;
            text-align: center;
        }

        .total-score {
            font-size: 24px;
            text-align: center;
            color: #f1c40f;
            font-weight: bold;
        }

        .ip-info {
            font-size: 12px;
            text-align: center;
            color: #95a5a6;
            margin-top: 5px;
        }

        .score-info {
            font-size: 12px;
            text-align: center;
            color: #95a5a6;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score-info">
            <p><small>* Счёт синхронизируется между всеми браузерами</small></p>
        </div>
        <div class="price-list">
            <h2>Прайс-лист</h2>
            <div class="price-items">
                <div class="price-category">
                    <div class="category-title">Джекпот</div>
                    <div class="price-item">
                        <span class="emoji">🎰</span>
                        <span class="points">2000</span>
                    </div>
                </div>
                <div class="price-category">
                    <div class="category-title">Удача</div>
                    <div class="price-item">
                        <span class="emoji">🍀</span>
                        <span class="points">1000</span>
                    </div>
                </div>
                <div class="price-category">
                    <div class="category-title">Природа</div>
                    <div class="price-item">
                        <span class="emoji">🌟</span>
                        <span class="points">500</span>
                    </div>
                </div>
                <div class="price-category">
                    <div class="category-title">Развлечения</div>
                    <div class="price-item">
                        <span class="emoji">🎬</span>
                        <span class="points">300</span>
                    </div>
                </div>
                <div class="price-category">
                    <div class="category-title">Музыка</div>
                    <div class="price-item">
                        <span class="emoji">🎼</span>
                        <span class="points">200</span>
                    </div>
                </div>
                <div class="price-category">
                    <div class="category-title">Игры</div>
                    <div class="price-item">
                        <span class="emoji">🎮</span>
                        <span class="points">100</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="slot-machine">
            <div class="reels">
                <div class="reel">
                    <div class="reel-strip" id="reel1"></div>
                </div>
                <div class="reel">
                    <div class="reel-strip" id="reel2"></div>
                </div>
                <div class="reel">
                    <div class="reel-strip" id="reel3"></div>
                </div>
                <svg class="win-lines" id="winLines"></svg>
            </div>
            <button class="spin-button" onclick="spin()">Крутить!</button>
            <div class="score">Счёт: <span class="score-value">0</span></div>
        </div>
        <div class="scores-table">
            <h2>Таблица очков</h2>
            <div class="scores-category">
                <div class="category-header">Чётные IP</div>
                <div class="total-score" id="evenScore">0</div>
                <div class="ip-info" id="evenIPs">Нет игроков</div>
            </div>
            <div class="scores-category">
                <div class="category-header">Нечётные IP</div>
                <div class="total-score" id="oddScore">0</div>
                <div class="ip-info" id="oddIPs">Нет игроков</div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Supabase
        const SUPABASE_URL = 'https://fzpfhuetylazrkkpopcl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6cGZodWV0eWxhenJra3BvcGNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzk3MDI5MTUsImV4cCI6MjA1NTI3ODkxNX0.BhaSWyq5IKhxjTwP14Fw9D-TDe9OYHosXR1mzHA2jqI';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let evenTotalScore = 0;
        let oddTotalScore = 0;
        let currentIP = '';
        let evenIPs = new Set();
        let oddIPs = new Set();
        let isSpinning = false;

        // Загружаем сохранённые данные из Supabase
        async function loadSavedScores() {
            try {
                console.log('Загружаем счет из Supabase...');
                const { data, error } = await supabase
                    .from('scores')
                    .select('*')
                    .single();
                
                if (error) {
                    console.error('Ошибка при загрузке из Supabase:', error);
                    throw error;
                }
                
                console.log('Получены данные:', data);
                
                if (data) {
                    evenTotalScore = data.even_total_score || 0;
                    oddTotalScore = data.odd_total_score || 0;
                    evenIPs = new Set(data.even_ips || []);
                    oddIPs = new Set(data.odd_ips || []);
                }
                
                // Обновляем отображение
                updateScoreDisplay();
            } catch (error) {
                console.error('Ошибка при загрузке данных:', error);
                // При ошибке загружаем из localStorage
                loadLocalScores();
            }
        }

        // Сохраняем данные в Supabase
        async function saveScores() {
            try {
                console.log('Сохраняем в Supabase...', {
                    evenTotalScore,
                    oddTotalScore,
                    evenIPs: Array.from(evenIPs),
                    oddIPs: Array.from(oddIPs)
                });

                const { error } = await supabase
                    .from('scores')
                    .upsert({
                        id: 1,
                        even_total_score: evenTotalScore,
                        odd_total_score: oddTotalScore,
                        even_ips: Array.from(evenIPs),
                        odd_ips: Array.from(oddIPs),
                        updated_at: new Date().toISOString()
                    });
                
                if (error) {
                    console.error('Ошибка при сохранении в Supabase:', error);
                    throw error;
                }
                
                console.log('Успешно сохранено в Supabase');
                
                // Сохраняем локальную копию
                saveLocalScores();
            } catch (error) {
                console.error('Ошибка при сохранении данных:', error);
                // При ошибке сохраняем только локально
                saveLocalScores();
            }
        }

        // Загружаем из localStorage (резервная копия)
        function loadLocalScores() {
            try {
                const savedData = localStorage.getItem('slotMachineScores');
                if (savedData) {
                    const data = JSON.parse(savedData);
                    evenTotalScore = data.evenTotalScore || 0;
                    oddTotalScore = data.oddTotalScore || 0;
                    evenIPs = new Set(data.evenIPs || []);
                    oddIPs = new Set(data.oddIPs || []);
                    updateScoreDisplay();
                }
            } catch (error) {
                console.error('Ошибка при загрузке из localStorage:', error);
            }
        }

        // Сохраняем в localStorage (резервная копия)
        function saveLocalScores() {
            try {
                const data = {
                    evenTotalScore,
                    oddTotalScore,
                    evenIPs: Array.from(evenIPs),
                    oddIPs: Array.from(oddIPs)
                };
                localStorage.setItem('slotMachineScores', JSON.stringify(data));
            } catch (error) {
                console.error('Ошибка при сохранении в localStorage:', error);
            }
        }

        // Подписываемся на изменения в реальном времени
        function subscribeToScores() {
            console.log('Подписываемся на обновления...');
            supabase
                .channel('scores')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'scores' }, 
                    payload => {
                        console.log('Получено обновление:', payload);
                        const newData = payload.new;
                        evenTotalScore = newData.even_total_score;
                        oddTotalScore = newData.odd_total_score;
                        evenIPs = new Set(newData.even_ips);
                        oddIPs = new Set(newData.odd_ips);
                        updateScoreDisplay();
                    }
                )
                .subscribe();
        }

        // Обновляем отображение счёта
        function updateScoreDisplay() {
            document.getElementById('evenScore').textContent = evenTotalScore;
            document.getElementById('oddScore').textContent = oddTotalScore;
            document.getElementById('evenIPs').textContent = 
                evenIPs.size > 0 ? `IP: ${Array.from(evenIPs).join(', ')}` : 'Нет игроков';
            document.getElementById('oddIPs').textContent = 
                oddIPs.size > 0 ? `IP: ${Array.from(oddIPs).join(', ')}` : 'Нет игроков';
        }

        // Обновляем общий счёт
        async function updateTotalScore(points) {
            if (!currentIP) return;
            
            const lastDigit = parseInt(currentIP.split('.').pop());
            const lastOctet = currentIP.split('.').pop();

            if (lastDigit % 2 === 0) {
                evenTotalScore += points;
                evenIPs.add(lastOctet);
            } else {
                oddTotalScore += points;
                oddIPs.add(lastOctet);
            }
            
            // Обновляем отображение и сохраняем
            updateScoreDisplay();
            await saveScores();
        }

        // Инициализация
        const emojiPrices = {
            '🎮': 100, // Игровые
            '🎲': 100,
            '🎯': 100,
            '🎱': 100,
            '🎳': 100,
            '🎼': 200, // Музыкальные
            '🎵': 200,
            '🎸': 200,
            '🎺': 200,
            '🎷': 200,
            '🎹': 200,
            '🎻': 200,
            '🎬': 300, // Развлекательные
            '🎪': 300,
            '🎨': 300,
            '🎭': 300,
            '🌟': 500, // Природные
            '💫': 500,
            '⭐': 500,
            '🌙': 500,
            '☀️': 500,
            '🌈': 500,
            '🍀': 1000, // Удачи
            '🎋': 1000,
            '🎍': 1000,
            '🎰': 2000  // Джекпот
        };

        const emojis = Object.keys(emojiPrices);
        let score = 0;

        // Создаем прайс-лист
        function createPriceList() {
            const priceItems = document.querySelector('.price-items');
            const sortedEmojis = [...emojis].sort((a, b) => emojiPrices[b] - emojiPrices[a]);
            
            sortedEmojis.forEach(emoji => {
                const item = document.createElement('div');
                item.className = 'price-item';
                item.innerHTML = `
                    <span class="emoji">${emoji}</span>
                    <span class="points">${emojiPrices[emoji]} очков</span>
                `;
                priceItems.appendChild(item);
            });
        }

        function updateScore(points) {
            score += points;
            document.querySelector('.score-value').textContent = score;
        }

        function getRandomEmoji() {
            return emojis[Math.floor(Math.random() * emojis.length)];
        }

        function createReelContent() {
            return Array(15).fill(null).map(() => {
                const div = document.createElement('div');
                div.className = 'emoji-symbol';
                div.textContent = getRandomEmoji();
                return div;
            });
        }

        function initializeReels() {
            const reels = ['reel1', 'reel2', 'reel3'].map(id => document.getElementById(id));
            reels.forEach(reel => {
                const symbols = createReelContent();
                symbols.forEach(symbol => reel.appendChild(symbol));
            });
        }

        function clearWinLines() {
            const svg = document.getElementById('winLines');
            svg.innerHTML = '';
        }

        function drawWinLine(x1, y1, x2, y2) {
            const svg = document.getElementById('winLines');
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.classList.add('win-line');
            svg.appendChild(line);
        }

        function checkWinningLines() {
            const reels = ['reel1', 'reel2', 'reel3'].map(id => document.getElementById(id));
            const symbols = reels.map(reel => {
                const visibleSymbols = [];
                const offset = Math.abs(parseInt(reel.style.top || '0')) / 60;
                for(let i = 0; i < 3; i++) {
                    const symbol = reel.children[i + Math.floor(offset)];
                    if(symbol) {
                        visibleSymbols.push(symbol.textContent);
                    }
                }
                return visibleSymbols;
            });

            let winnings = 0;

            // Проверяем горизонтальные линии
            for(let row = 0; row < 3; row++) {
                for(let col = 0; col < 2; col++) {
                    if(symbols[col][row] === symbols[col + 1][row]) {
                        const x1 = 40 + col * 90;
                        const x2 = 40 + (col + 1) * 90;
                        const y = 30 + row * 60;
                        drawWinLine(x1, y, x2, y);
                        winnings += emojiPrices[symbols[col][row]];
                    }
                }
            }

            // Проверяем диагональные линии (сверху вниз)
            for(let row = 0; row < 2; row++) {
                for(let col = 0; col < 2; col++) {
                    if(symbols[col][row] === symbols[col + 1][row + 1]) {
                        const x1 = 40 + col * 90;
                        const y1 = 30 + row * 60;
                        const x2 = 40 + (col + 1) * 90;
                        const y2 = 30 + (row + 1) * 60;
                        drawWinLine(x1, y1, x2, y2);
                        winnings += emojiPrices[symbols[col][row]];
                    }
                }
            }

            // Проверяем диагональные линии (снизу вверх)
            for(let row = 1; row < 3; row++) {
                for(let col = 0; col < 2; col++) {
                    if(symbols[col][row] === symbols[col + 1][row - 1]) {
                        const x1 = 40 + col * 90;
                        const y1 = 30 + row * 60;
                        const x2 = 40 + (col + 1) * 90;
                        const y2 = 30 + (row - 1) * 60;
                        drawWinLine(x1, y1, x2, y2);
                        winnings += emojiPrices[symbols[col][row]];
                    }
                }
            }

            // Проверяем вертикальные линии
            for(let col = 0; col < 3; col++) {
                for(let row = 0; row < 2; row++) {
                    if(symbols[col][row] === symbols[col][row + 1]) {
                        const x = 40 + col * 90;
                        const y1 = 30 + row * 60;
                        const y2 = 30 + (row + 1) * 60;
                        drawWinLine(x, y1, x, y2);
                        winnings += emojiPrices[symbols[col][row]];
                    }
                }
            }

            if(winnings > 0) {
                updateScore(winnings);
                updateTotalScore(winnings);
            }
        }

        // Получаем IP пользователя
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                console.error('Ошибка при получении IP:', error);
                return null;
            }
        }

        async function spin() {
            if (isSpinning) return;
            
            // Получаем IP перед каждым спином
            if (!currentIP) {
                currentIP = await getIP();
            }
            
            isSpinning = true;
            clearWinLines();
            
            const reels = [
                document.getElementById('reel1'),
                document.getElementById('reel2'),
                document.getElementById('reel3')
            ];
            
            const button = document.querySelector('.spin-button');
            button.disabled = true;

            reels.forEach((reel, index) => {
                const newSymbols = createReelContent();
                reel.innerHTML = '';
                newSymbols.forEach(symbol => reel.appendChild(symbol));
                
                reel.classList.add('spinning');
                
                setTimeout(() => {
                    reel.classList.remove('spinning');
                    reel.style.transition = 'top 0.5s cubic-bezier(0.3, 0, 0, 1)';
                    
                    const stopPosition = Math.floor(Math.random() * 3) * 60;
                    reel.style.top = `-${stopPosition}px`;
                    
                    if (index === 2) {
                        setTimeout(() => {
                            isSpinning = false;
                            button.disabled = false;
                            checkWinningLines();
                        }, 500);
                    }
                }, 2000 + index * 700);
            });
        }

        // Инициализация
        async function initialize() {
            try {
                await initializeReels();
                await loadSavedScores();
                subscribeToScores();
                console.log('Инициализация завершена успешно');
            } catch (error) {
                console.error('Ошибка при инициализации:', error);
            }
        }

        // Запускаем инициализацию
        initialize();
    </script>
</body>
</html>
