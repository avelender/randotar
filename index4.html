<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Slot Machine</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #2c3e50;
            font-family: Arial, sans-serif;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            padding: 20px;
            max-height: 100vh;
            box-sizing: border-box;
        }

        .price-list {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 280px;
        }

        .price-category {
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

        .price-category:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .price-category-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .price-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            font-size: 13px;
        }

        .price-item {
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 5px;
            background: #f8f9fa;
        }

        .price-item span {
            margin-right: 5px;
        }

        .price-item .points {
            color: #28a745;
            font-size: 12px;
        }

        .slot-machine {
            background: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .reels {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
            justify-content: center;
            padding: 10px;
        }

        .reel {
            width: 80px;
            height: 180px;
            background: white;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .reel-strip {
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .emoji-symbol {
            width: 80px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            flex-shrink: 0;
        }

        /* Стили для анимации */
        @keyframes spin {
            0% { transform: translateY(0); }
            100% { transform: translateY(-840px); }
        }

        .spinning {
            animation: spin 0.5s linear infinite;
        }

        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: flex-start;
        }

        .bonus-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bonus-timer {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }

        .spin-button, .bonus-button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .spin-button {
            background-color: #e74c3c;
            color: white;
        }

        .spin-button:hover {
            background-color: #c0392b;
        }

        .bonus-button {
            background-color: #2ecc71;
            color: white;
        }

        .bonus-button:hover {
            background-color: #27ae60;
        }

        .spin-button:disabled, .bonus-button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .spin-button:active, .bonus-button:active {
            transform: scale(0.98);
        }

        .score {
            color: white;
            font-size: 24px;
            margin-top: 20px;
            text-align: center;
        }

        .score-value {
            color: #f1c40f;
            font-weight: bold;
        }

        .scores-table {
            background: #34495e;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            color: white;
            width: 280px;
        }

        .scores-table h2 {
            margin: 0 0 15px 0;
            text-align: center;
            color: #f1c40f;
            font-size: 20px;
        }

        .scores-category {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .scores-category:last-child {
            margin-bottom: 0;
        }

        .category-header {
            color: #3498db;
            font-size: 16px;
            margin-bottom: 8px;
            text-align: center;
        }

        .total-score {
            font-size: 24px;
            text-align: center;
            color: #f1c40f;
            font-weight: bold;
        }

        .category-ips {
            font-size: 12px;
            text-align: center;
            color: #95a5a6;
            margin-top: 5px;
        }

        /* Стили для линий выигрыша */
        #winLines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .win-line {
            stroke: #ffff00;
            stroke-width: 8;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px rgba(255, 255, 0, 1)) 
                   drop-shadow(0 0 12px rgba(255, 165, 0, 0.8));
            opacity: 1;
        }

        @keyframes drawLine {
            from {
                stroke-dashoffset: 1000;
                opacity: 0;
            }
            to {
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        .win-line {
            stroke-dasharray: 1000;
            animation: drawLine 0.5s ease-out forwards;
        }
    </style>
</head>
<body>

                    <div class="price-item"><span>🎪</span><span class="points">150</span></div>
                    <div class="price-item"><span>🎨</span><span class="points">150</span></div>

            </div>
            <div class="price-category">
                <div class="price-category-title">Luck (500-1000)</div>
                <div class="price-items">
                    <div class="price-item"><span>🍀</span><span class="points">500</span></div>
                    <div class="price-item"><span>🎋</span><span class="points">500</span></div>
                    <div class="price-item"><span>🎍</span><span class="points">500</span></div>
                    <div class="price-item"><span>🎰</span><span class="points">1000</span></div>

        </div>
        <div class="slot-machine">
            <div class="reels">
                <div class="reel">
                    <div class="reel-strip"></div>
                </div>
                <div class="reel">

            </div>
            <div class="controls">
                <button class="spin-button">Spin</button>

        <div class="scores-table">

            </div>
            <div class="scores-category">
                <div class="category-header">Odd IP</div>

    <script>
        // Инициализация Supabase
        const SUPABASE_URL = 'https://fzpfhuetylazrkkpopcl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6cGZodWV0eWxhenJra3BvcGNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzk3MDI5MTUsImV4cCI6MjA1NTI3ODkxNX0.BhaSWyq5IKhxjTwP14Fw9D-TDe9OYHosXR1mzHA2jqI';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentIP = null;
        let isSpinning = false;
        let evenTotalScore = 0;
        let oddTotalScore = 0;
        let evenIPs = new Set();
        let oddIPs = new Set();

        // Загружаем сохранённые данные из Supabase
        async function loadSavedScores() {
            try {
                console.log('Загружаем счет из Supabase...');
                const { data, error } = await supabase
                    .from('scores')
                    .select('*')
                    .single();
                
                if (error) {
                    console.error('Ошибка при загрузке из Supabase:', error);
                    throw error;
                }
                
                console.log('Получены данные:', data);
                
                if (data) {
                    evenTotalScore = data.even_total_score || 0;
                    oddTotalScore = data.odd_total_score || 0;
                    evenIPs = new Set(data.even_ips || []);
                    oddIPs = new Set(data.odd_ips || []);
                }
                
                // Обновляем отображение
                updateScoreDisplay();
            } catch (error) {
                console.error('Ошибка при загрузке данных:', error);
                // При ошибке загружаем из localStorage
                loadLocalScores();
            }
        }

        // Сохраняем данные в Supabase
        async function saveScores() {
            try {
                console.log('Сохраняем в Supabase...', {
                    evenTotalScore,
                    oddTotalScore,
                    evenIPs: Array.from(evenIPs),
                    oddIPs: Array.from(oddIPs)
                });

                const { error } = await supabase
                    .from('scores')
                    .upsert({
                        id: 1,
                        even_total_score: evenTotalScore,
                        odd_total_score: oddTotalScore,
                        even_ips: Array.from(evenIPs),
                        odd_ips: Array.from(oddIPs),
                        updated_at: new Date().toISOString()
                    });
                
                if (error) {
                    console.error('Ошибка при сохранении в Supabase:', error);
                    throw error;
                }
                
                console.log('Успешно сохранено в Supabase');
                
                // Сохраняем локальную копию
                saveLocalScores();
            } catch (error) {
                console.error('Ошибка при сохранении данных:', error);
                // При ошибке сохраняем только локально
                saveLocalScores();
            }
        }

        // Загружаем из localStorage (резервная копия)
        function loadLocalScores() {
            try {
                const savedData = localStorage.getItem('slotMachineScores');
                if (savedData) {
                    const data = JSON.parse(savedData);
                    evenTotalScore = data.evenTotalScore || 0;
                    oddTotalScore = data.oddTotalScore || 0;
                    evenIPs = new Set(data.evenIPs || []);
                    oddIPs = new Set(data.oddIPs || []);
                    updateScoreDisplay();
                }
            } catch (error) {
                console.error('Ошибка при загрузке из localStorage:', error);
            }
        }

        // Сохраняем в localStorage (резервная копия)
        function saveLocalScores() {
            try {
                const data = {
                    evenTotalScore,
                    oddTotalScore,
                    evenIPs: Array.from(evenIPs),
                    oddIPs: Array.from(oddIPs)
                };
                localStorage.setItem('slotMachineScores', JSON.stringify(data));
            } catch (error) {
                console.error('Ошибка при сохранении в localStorage:', error);
            }
        }

        // Подписываемся на изменения в реальном времени
        function subscribeToScores() {
            console.log('Подписываемся на обновления...');
            supabase
                .channel('scores')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'scores' }, 
                    payload => {
                        console.log('Получено обновление:', payload);
                        const newData = payload.new;
                        evenTotalScore = newData.even_total_score;
                        oddTotalScore = newData.odd_total_score;
                        evenIPs = new Set(newData.even_ips);
                        oddIPs = new Set(newData.odd_ips);
                        updateScoreDisplay();
                    }
                )
                .subscribe();
        }

        // Обновляем отображение счёта
        function updateScoreDisplay() {
            document.getElementById('evenScore').textContent = evenTotalScore;
            document.getElementById('oddScore').textContent = oddTotalScore;
            document.getElementById('evenIPs').textContent = 
                evenIPs.size > 0 ? `IP: ${Array.from(evenIPs).join(', ')}` : 'No players';
            document.getElementById('oddIPs').textContent = 
                oddIPs.size > 0 ? `IP: ${Array.from(oddIPs).join(', ')}` : 'No players';
        }

        // Обновляем общий счёт
        async function updateTotalScore(points) {
            if (!currentIP) return;
            
            const lastDigit = parseInt(currentIP.split('.').pop());
            const lastOctet = currentIP.split('.').pop();

            if (lastDigit % 2 === 0) {
                evenTotalScore += points;
                evenIPs.add(lastOctet);
            } else {
                oddTotalScore += points;
                oddIPs.add(lastOctet);
            }
            
            // Обновляем отображение и сохраняем
            updateScoreDisplay();
            await saveScores();
        }

        // Функция для получения IP
        async function getClientIP() {
            try {
                console.log('Получаем IP адрес...');
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                currentIP = data.ip;
                console.log('Получен IP:', currentIP);
            } catch (error) {
                console.error('Ошибка при получении IP:', error);
                // Если не удалось получить IP, используем случайное число
                currentIP = Math.floor(Math.random() * 256).toString();
                console.log('Используем случайный IP:', currentIP);
            }
        }

        // Функция для сохранения времени следующего бонуса
        function saveBonusTime(nextBonusTime) {
            try {
                localStorage.setItem('nextBonusTime', nextBonusTime.toString());
                console.log('Сохранено время бонуса:', new Date(nextBonusTime).toLocaleString());
            } catch (error) {
                console.error('Ошибка при сохранении времени бонуса:', error);
            }
        }

        // Функция для загрузки времени следующего бонуса
        function loadBonusTime() {
            try {
                const savedTime = localStorage.getItem('nextBonusTime');
                console.log('Загружено время бонуса:', savedTime ? new Date(parseInt(savedTime)).toLocaleString() : 'не найдено');
                return savedTime ? parseInt(savedTime) : null;
            } catch (error) {
                console.error('Ошибка при загрузке времени бонуса:', error);
                return null;
            }
        }

        let timerInterval = null;
        let bonusButton;
        let bonusTimer;

        // Функция для получения бонуса
        async function claimBonus() {
            console.log('Нажата кнопка бонуса');
            
            try {
                if (!currentIP) {
                    // Пробуем получить IP
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    currentIP = data.ip;
                    console.log('Получен IP:', currentIP);
                }

                if (!currentIP) {
                    console.error('IP не определен');
                    return;
                }

                console.log('Текущий IP:', currentIP);

                // Добавляем 100 очков в соответствующий счетчик
                await updateTotalScore(100);
                console.log('Очки начислены');
                
                // Отключаем кнопку и запускаем таймер
                bonusButton.disabled = true;
                
                // Генерируем случайное время ожидания (15-120 секунд)
                const waitTime = getRandomInt(15, 120);
                const nextBonusTime = Date.now() + (waitTime * 1000);
                
                console.log(`Установлен таймер на ${waitTime} секунд до ${new Date(nextBonusTime).toLocaleString()}`);
                
                // Сохраняем время следующего бонуса
                localStorage.setItem('nextBonusTime', nextBonusTime.toString());
                
                // Запускаем таймер
                startBonusTimer(nextBonusTime);
            } catch (error) {
                console.error('Ошибка при получении бонуса:', error);
                activateBonus(); // В случае ошибки активируем кнопку
            }
        }

        // Функция для запуска таймера бонуса
        function startBonusTimer(nextBonusTime) {
            console.log('Запуск таймера');
            
            // Очищаем предыдущий интервал если есть
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            function updateTimer() {
                const now = Date.now();
                const timeLeft = Math.max(0, Math.ceil((nextBonusTime - now) / 1000));
                console.log('Осталось секунд:', timeLeft);
                
                if (timeLeft <= 0) {
                    console.log('Время истекло, активируем бонус');
                    clearInterval(timerInterval);
                    activateBonus();
                } else {
                    bonusButton.disabled = true;
                    bonusTimer.textContent = `Available in: ${formatTime(timeLeft)}`;
                }
            }
            
            // Сразу обновляем и запускаем таймер
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
            console.log('Таймер запущен');
        }

        // Функция для активации бонусной кнопки
        function activateBonus() {
            console.log('Активация бонусной кнопки');
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            bonusButton.disabled = false;
            bonusTimer.textContent = 'Bonus available!';
            localStorage.removeItem('nextBonusTime');
            console.log('Бонусная кнопка активирована');
        }

        // Функция для получения случайного числа в диапазоне
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Функция для форматирования времени
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        // Инициализация
        async function initialize() {
            try {
                console.log('Начало инициализации...');
                
                // Сначала получаем IP
                await getClientIP();
                console.log('IP получен:', currentIP);
                
                // Инициализируем барабаны
                await initializeReels();
                console.log('Барабаны инициализированы');
                
                // Загружаем сохраненные очки
                await loadSavedScores();
                console.log('Очки загружены');
                
                // Подписываемся на обновления
                subscribeToScores();
                console.log('Подписка на обновления активирована');
                
                // Инициализируем кнопку спина
                const spinButton = document.querySelector('.spin-button');
                if (spinButton) {
                    console.log('Кнопка спина найдена');
                    spinButton.addEventListener('click', () => {
                        console.log('Клик по кнопке спина');
                        spin();
                    });
                } else {
                    console.error('Кнопка спина не найдена');
                }
                
                // Инициализируем элементы бонусной системы
                bonusButton = document.getElementById('bonusButton');
                if (bonusButton) {
                    console.log('Кнопка бонуса найдена');
                    bonusButton.addEventListener('click', () => {
                        console.log('Клик по кнопке бонуса');
                        claimBonus();
                    });
                } else {
                    console.error('Кнопка бонуса не найдена');
                }
                bonusTimer = document.getElementById('bonusTimer');
                
                // Проверяем сохраненное время бонуса
                const savedTime = localStorage.getItem('nextBonusTime');
                if (savedTime) {
                    const nextBonusTime = parseInt(savedTime);
                    if (nextBonusTime > Date.now()) {
                        startBonusTimer(nextBonusTime);
                    } else {
                        activateBonus();
                    }
                } else {
                    activateBonus();
                }
                
                console.log('Инициализация завершена успешно');
            } catch (error) {
                console.error('Ошибка при инициализации:', error);
            }
        }

        let emojiPrices = {
            '🎮': 50,  // Gaming
            '🎲': 50,
            '🎯': 50,
            '🎱': 50,
            '🎳': 50,
            '🎼': 100, // Music
            '🎵': 100,
            '🎸': 100,
            '🎺': 100,
            '🎷': 100,
            '🎹': 100,
            '🎻': 100,
            '🎬': 150, // Entertainment
            '🎪': 150,
            '🎨': 150,
            '🎭': 150,
            '🌟': 250, // Nature
            '💫': 250,
            '⭐': 250,
            '🌙': 250,
            '☀️': 250,
            '🌈': 250,
            '🍀': 500, // Luck
            '🎋': 500,
            '🎍': 500,
            '🎰': 1000 // Jackpot
        };

        let emojis = Object.keys(emojiPrices);
        let score = 0;

        // Создаем прайс-лист
        function createPriceList() {
            const priceItems = document.querySelector('.price-items');
            const sortedEmojis = [...emojis].sort((a, b) => emojiPrices[b] - emojiPrices[a]);
            
            sortedEmojis.forEach(emoji => {
                const item = document.createElement('div');
                item.className = 'price-item';
                item.innerHTML = `
                    <span class="emoji">${emoji}</span>
                    <span class="points">${emojiPrices[emoji]} points</span>
                `;
                priceItems.appendChild(item);
            });
        }

        function updateScore(points) {
            score += points;
            document.querySelector('.score-value').textContent = score;
        }

        function getRandomEmoji() {
            return emojis[Math.floor(Math.random() * emojis.length)];
        }

        function createReelContent() {
            return Array(15).fill(null).map(() => {
                const div = document.createElement('div');
                div.className = 'emoji-symbol';
                div.textContent = getRandomEmoji();
                return div;
            });
        }

        function initializeReels() {
            const reelStrips = document.querySelectorAll('.reel-strip');
            reelStrips.forEach(strip => {
                const symbols = createReelContent();
                strip.innerHTML = ''; // Очищаем содержимое
                symbols.forEach(symbol => strip.appendChild(symbol));
            });
        }

        function clearWinLines() {
            const winLines = document.getElementById('winLines');
            if (winLines) {
                winLines.innerHTML = '';
            }
        }

        function drawWinLine(x1, y1, x2, y2) {
            const winLines = document.getElementById('winLines');
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1);
            line.setAttribute("y1", y1);
            line.setAttribute("x2", x2);
            line.setAttribute("y2", y2);
            line.setAttribute("class", "win-line");
            winLines.appendChild(line);
        }

        async function spin() {
            if (isSpinning) return;

            // Проверяем IP
            if (!currentIP) {
                console.error('IP не определен');
                return;
            }

            // Определяем, к какой группе относится IP
            const lastDigit = parseInt(currentIP.split('.').pop());
            const isEven = lastDigit % 2 === 0;
            const currentScore = isEven ? evenTotalScore : oddTotalScore;

            // Проверяем, достаточно ли очков
            if (currentScore < 100) {
                alert(`Недостаточно очков для спина! Нужно 100, а в вашей группе ${currentScore}`);
                return;
            }

            // Списываем 100 очков
            if (isEven) {
                evenTotalScore -= 100;
                evenIPs.add(currentIP.split('.').pop());
            } else {
                oddTotalScore -= 100;
                oddIPs.add(currentIP.split('.').pop());
            }

            // Обновляем отображение и сохраняем
            updateScoreDisplay();
            await saveScores();
            
            isSpinning = true;
            clearWinLines();
            
            const reelStrips = document.querySelectorAll('.reel-strip');
            const button = document.querySelector('.spin-button');
            button.disabled = true;

            // Создаем новые символы для каждого барабана
            const newReelContents = Array(3).fill(null).map(() => createReelContent());
            
            reelStrips.forEach((strip, index) => {
                // Очищаем и добавляем новые символы
                strip.innerHTML = '';
                newReelContents[index].forEach(symbol => strip.appendChild(symbol));
                
                // Запускаем анимацию
                strip.classList.add('spinning');
                
                // Останавливаем барабан через определенное время
                setTimeout(() => {
                    strip.classList.remove('spinning');
                    // Генерируем случайную позицию остановки (0, 60 или 120 пикселей)
                    const stopPosition = Math.floor(Math.random() * 3) * 60;
                    strip.style.transform = `translateY(-${stopPosition}px)`;
                    
                    // Если это последний барабан
                    if (index === 2) {
                        setTimeout(() => {
                            isSpinning = false;
                            button.disabled = false;
                            checkWinningLines();
                        }, 500);
                    }
                }, 2000 + index * 700); // Каждый следующий барабан останавливается с задержкой
            });
        }

        function checkWinningLines() {
            const reelStrips = document.querySelectorAll('.reel-strip');
            const symbols = Array.from(reelStrips).map(strip => {
                const visibleSymbols = [];
                const offset = Math.abs(parseInt(strip.style.transform?.match(/-?\d+/)?.[0] || '0')) / 60;
                for(let i = 0; i < 3; i++) {
                    const symbol = strip.children[i + Math.floor(offset)];
                    if(symbol) {
                        visibleSymbols.push(symbol.textContent);
                    }
                }
                return visibleSymbols;
            });

            let winnings = 0;

            // Константы для позиционирования
            const reelWidth = 80;    // Ширина барабана
            const symbolHeight = 60;  // Высота символа
            const reelGap = 10;      // Расстояние между барабанами
            const offsetX = 10;      // Уменьшили смещение по X с 15 до 10
            const offsetY = 15;      // Уменьшили смещение по Y с 20 до 15

            // Функция для получения координат центра символа
            function getSymbolCenter(col, row) {
                const x = col * (reelWidth + reelGap) + offsetX + reelWidth/2;
                const y = row * symbolHeight + offsetY + symbolHeight/2;
                return { x, y };
            }

            // Проверяем горизонтальные линии
            for(let row = 0; row < 3; row++) {
                if(symbols[0][row] === symbols[1][row] && symbols[1][row] === symbols[2][row]) {
                    const start = getSymbolCenter(0, row);
                    const end = getSymbolCenter(2, row);
                    drawWinLine(start.x, start.y, end.x, end.y);
                    winnings += emojiPrices[symbols[0][row]] * 3;
                } else {
                    if(symbols[0][row] === symbols[1][row]) {
                        const start = getSymbolCenter(0, row);
                        const end = getSymbolCenter(1, row);
                        drawWinLine(start.x, start.y, end.x, end.y);
                        winnings += emojiPrices[symbols[0][row]] * 2;
                    }
                    if(symbols[1][row] === symbols[2][row]) {
                        const start = getSymbolCenter(1, row);
                        const end = getSymbolCenter(2, row);
                        drawWinLine(start.x, start.y, end.x, end.y);
                        winnings += emojiPrices[symbols[1][row]] * 2;
                    }
                }
            }

            // Проверяем вертикальные линии
            for(let col = 0; col < 3; col++) {
                if(symbols[col][0] === symbols[col][1] && symbols[col][1] === symbols[col][2]) {
                    const start = getSymbolCenter(col, 0);
                    const end = getSymbolCenter(col, 2);
                    drawWinLine(start.x, start.y, end.x, end.y);
                    winnings += emojiPrices[symbols[col][0]] * 3;
                } else {
                    if(symbols[col][0] === symbols[col][1]) {
                        const start = getSymbolCenter(col, 0);
                        const end = getSymbolCenter(col, 1);
                        drawWinLine(start.x, start.y, end.x, end.y);
                        winnings += emojiPrices[symbols[col][0]] * 2;
                    }
                    if(symbols[col][1] === symbols[col][2]) {
                        const start = getSymbolCenter(col, 1);
                        const end = getSymbolCenter(col, 2);
                        drawWinLine(start.x, start.y, end.x, end.y);
                        winnings += emojiPrices[symbols[col][1]] * 2;
                    }
                }
            }

            // Проверяем диагональные линии
            // Главная диагональ (сверху слева вниз направо)
            if(symbols[0][0] === symbols[1][1] && symbols[1][1] === symbols[2][2]) {
                const start = getSymbolCenter(0, 0);
                const end = getSymbolCenter(2, 2);
                drawWinLine(start.x, start.y, end.x, end.y);
                winnings += emojiPrices[symbols[0][0]] * 3;
            } else {
                if(symbols[0][0] === symbols[1][1]) {
                    const start = getSymbolCenter(0, 0);
                    const end = getSymbolCenter(1, 1);
                    drawWinLine(start.x, start.y, end.x, end.y);
                    winnings += emojiPrices[symbols[0][0]] * 2;
                }
                if(symbols[1][1] === symbols[2][2]) {
                    const start = getSymbolCenter(1, 1);
                    const end = getSymbolCenter(2, 2);
                    drawWinLine(start.x, start.y, end.x, end.y);
                    winnings += emojiPrices[symbols[1][1]] * 2;
                }
            }

            // Обратная диагональ (снизу слева вверх направо)
            if(symbols[0][2] === symbols[1][1] && symbols[1][1] === symbols[2][0]) {
                const start = getSymbolCenter(0, 2);
                const end = getSymbolCenter(2, 0);
                drawWinLine(start.x, start.y, end.x, end.y);
                winnings += emojiPrices[symbols[0][2]] * 3;
            } else {
                if(symbols[0][2] === symbols[1][1]) {
                    const start = getSymbolCenter(0, 2);
                    const end = getSymbolCenter(1, 1);
                    drawWinLine(start.x, start.y, end.x, end.y);
                    winnings += emojiPrices[symbols[0][2]] * 2;
                }
                if(symbols[1][1] === symbols[2][0]) {
                    const start = getSymbolCenter(1, 1);
                    const end = getSymbolCenter(2, 0);
                    drawWinLine(start.x, start.y, end.x, end.y);
                    winnings += emojiPrices[symbols[1][1]] * 2;
                }
            }

            // Дополнительные короткие диагонали
            // Сверху слева вниз направо
            if(symbols[0][1] === symbols[1][2]) {
                const start = getSymbolCenter(0, 1);
                const end = getSymbolCenter(1, 2);
                drawWinLine(start.x, start.y, end.x, end.y);
                winnings += emojiPrices[symbols[0][1]] * 2;
            }
            if(symbols[1][0] === symbols[2][1]) {
                const start = getSymbolCenter(1, 0);
                const end = getSymbolCenter(2, 1);
                drawWinLine(start.x, start.y, end.x, end.y);
                winnings += emojiPrices[symbols[1][0]] * 2;
            }

            // Снизу слева вверх направо
            if(symbols[0][1] === symbols[1][0]) {
                const start = getSymbolCenter(0, 1);
                const end = getSymbolCenter(1, 0);
                drawWinLine(start.x, start.y, end.x, end.y);
                winnings += emojiPrices[symbols[0][1]] * 2;
            }
            if(symbols[1][2] === symbols[2][1]) {
                const start = getSymbolCenter(1, 2);
                const end = getSymbolCenter(2, 1);
                drawWinLine(start.x, start.y, end.x, end.y);
                winnings += emojiPrices[symbols[1][2]] * 2;
            }

            if(winnings > 0) {
                const lastDigit = parseInt(currentIP.split('.').pop());
                const isEven = lastDigit % 2 === 0;
                
                if(isEven) {
                    evenTotalScore += winnings;
                    evenIPs.add(currentIP.split('.').pop());
                } else {
                    oddTotalScore += winnings;
                    oddIPs.add(currentIP.split('.').pop());
                }
                
                updateScoreDisplay();
                saveScores();
            }
        }

        // Запускаем инициализацию
        initialize();
    </script>
</body>
</html>
