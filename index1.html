<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background-color: #f5f5dc;
        }
        .line {
            position: absolute;
            transition: height ease-in-out, transform ease-in-out; /* Плавное движение */
        }
    </style>
</head>
<body>
    <script>
        function getRandomColor() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            return `rgba(${r}, ${g}, ${b}, 0.75)`; // 0.75 - это 75% непрозрачности (25% прозрачности)
        }

        function createLine() {
            const line = document.createElement('div');
            line.className = 'line';
            line.style.left = Math.random() * 100 + '%';
            line.style.height = Math.random() * 100 + '%'; // Случайная длина от 0% до 100% высоты экрана
            line.style.width = Math.random() * 100 + 1 + 'px'; // Случайная ширина от 1 до 20 пикселей
            line.style.backgroundColor = getRandomColor(); // Случайный цвет
            line.style.transform = 'translateY(100vh)'; // Начальная позиция за экраном
            document.body.appendChild(line);

            const duration = Math.random() * 2 + 1; // Случайная скорость от 1 до 3 секунд

            setTimeout(() => {
                line.style.transitionDuration = duration + 's'; // Установка случайной скорости
                line.style.transform = 'translateY(0)'; // Линия выезжает на экран
            }, Math.random() * 1000);
        }

        setInterval(createLine, 2000);
    </script>
</body>
</html>
